<!DOCTYPE html>
<html>

<head>

    <title>HomeArtist.online</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f5f5f5;
        }

        .navbar{
            background:black;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .hero{
            background:white;
            padding:40px;
            text-align:center;
        }

        .hero h1{
            font-size:40px;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:30px;
        }

        .blog-card{
            background:white;
            margin-bottom:20px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .blog-card h2{
            margin-top:0;
        }

        .button{
            background:black;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:5px;
        }

        .footer{
            margin-top:50px;
            background:black;
            color:white;
            text-align:center;
            padding:20px;
        }

    </style>

</head>

<body>

    <div class="navbar">

        HomeArtist.online

    </div>

    <div class="hero">

        <h1>Trending Decoration Ideas</h1>

        <p>
            AI Generated Trending Decoration Blogs,
            Nail Art Ideas,
            Party Themes &
            Event Inspiration
        </p>

    </div>

    <div class="container">

        {% for blog in blogs %}

        <div class="blog-card">

            <h2>{{ blog["title"] }}</h2>

            <p>

                {{ blog["content"][:250] }}...

            </p>

            <br>

            <a href="/blog/{{ blog['id'] }}" class="button">

                Read More

            </a>

        </div>

        {% endfor %}

    </div>

    <div class="footer">

        © 2026 HomeArtist.online

    </div>

</body>

</html>

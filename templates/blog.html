<!DOCTYPE html>
<html>

<head>

    <title>{{ blog["title"] }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f5f5f5;
        }

        .navbar{
            background:black;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        pre{
            white-space: pre-wrap;
            font-family:Arial;
            line-height:1.7;
        }

        .button{
            background:black;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

    <div class="navbar">

        HomeArtist.online

    </div>

    <div class="container">

        <a href="/" class="button">

            ← Back

        </a>

        <br><br>

        <h1>{{ blog["title"] }}</h1>

        <hr>

        <pre>{{ blog["content"] }}</pre>

    </div>

</body>

</html>
